services:
  postgres:
    image: postgres:16-alpine
    container_name: smartrecycleai-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: smartrecycleai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://smartrecycle:smartrecycle_dev_password@postgres:5432/smartrecycleai
      AI_ENGINE_URL: http://ai-engine:8100
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      ai-engine:
        condition: service_started

  ai-engine:
    build:
      context: ./ai-engine
    container_name: smartrecycleai-ai-engine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8100:8100"
    volumes:
      - ./ai-engine/ai_engine:/app/ai_engine
      - ./ai-engine/models:/app/models

  frontend:
    build:
      context: ./frontend
    container_name: smartrecycleai-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
